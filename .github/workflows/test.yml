name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── booking-service ────────────────────────────────────────────────────────
  booking-service:
    name: booking-service tests
    runs-on: ubuntu-latest

    services:
      dynamodb:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: stagepass
          POSTGRES_PASSWORD: stagepass
          POSTGRES_DB: stagepass_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      DYNAMODB_ENDPOINT: http://localhost:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DATABASE_URL: postgresql://stagepass:stagepass@localhost:5432/stagepass_ci
      REDIS_URL: redis://localhost:6379
      WS_MODE: local
      WS_SERVER_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create DynamoDB table
        run: pnpm --filter booking-service dynamo:create

      - name: Run Prisma migrations
        run: pnpm --filter booking-service db:migrate

      - name: Seed test data
        run: pnpm --filter booking-service db:seed

      - name: Run tests
        run: pnpm --filter booking-service test

  # ── ws-server ──────────────────────────────────────────────────────────────
  ws-server:
    name: ws-server tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter ws-server test

  # ── frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: frontend tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      BOOKING_SERVICE_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter frontend test
